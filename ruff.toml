include = ['*.py']
exclude = [
  '.bzr',
  '.direnv',
  '.history',
  '.eggs',
  '.git',
  '.git-rewrite',
  '.hg',
  '.ipynb_checkpoints',
  '.mypy_cache',
  '.nox',
  '.pants.d',
  '.pyenv',
  '.pytest_cache',
  '.pytype',
  '.ruff_cache',
  '.svn',
  '.tox',
  '.venv',
  '.vscode',
  '__pypackages__',
  '_build',
  'buck-out',
  'build',
  'dist',
  'node_modules',
  'site-packages',
  'venv',
]
respect-gitignore = true
target-version = 'py313'
line-length = 120
fix = false
output-format = 'concise'
src = ['app', 'tests']

[lint]
preview = true
select = [
  'E',
  'F',
  'UP',
  'B',
  'SIM',
  'I',
  'D',
  'DOC',
  'N',
  'S',
]
ignore = ['D415']

[lint.per-file-ignores]
'tests/**/*.py' = ['D', 'DOC', 'S101', 'ANN201']
'benchmarks/tests/**/*.py' = ['D', 'DOC']
'migrations/**/*.py' = ['D', 'DOC']
'**/__init__.py' = ['F401']

[lint.pydocstyle]
convention = 'google'

[lint.isort]
force-single-line = false
order-by-type = false

[format]
quote-style = 'single'
docstring-code-format = true
indent-style = 'space'
skip-magic-trailing-comma = false
line-ending = 'lf'
